name: Canary Release

on:
  push:
    branches: [canary]

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version and dist-tag
        run: |
          CURRENT=$(node -p "require('./packages/publish/package.json').version")
          SHA=$(git rev-parse --short HEAD)
          npm --prefix packages/publish pkg set version="${CURRENT}-canary.${SHA}"
          echo "DIST_TAG=canary" >> $GITHUB_ENV

      - name: Build
        run: pnpm -F koota build

      - name: Test
        run: pnpm -F koota test run

      - name: Publish
        run: pnpm -F koota publish --tag ${{ env.DIST_TAG }} --no-git-checks
